  - id: configuration__connecting-resources
    title: Connecting Resources
    route: configuration/connecting-resources
    order: 11
    section: configuration
    shortDescription: Explain connectTo and document the environment variables it
      injects per resource type.
    instructions:
      - Cover BOTH the concept of connectTo AND the table of environment
        variables injected per resource type (formerly
        /reference/environment-variables-injected-by-connectto). The reference
        content lives here now — do not link out to a separate page.
      - Include a complete, copyable TypeScript constructor-style example for a
        Hono-style Lambda API connected to a DynamoDB table. It must keep
        imports, defineConfig, DynamoDbTable, HttpApiGateway, LambdaFunction,
        StacktapeLambdaBuildpackPackaging, connectTo, and the returned resources
        object in one CodeBlock so the generated LLM-doc chunk answers MCP agent
        prompts without needing another chunk.
      - 'The Lambda + DynamoDB example must use connectTo for read/write
        DynamoDB access and mention the injected STP_USERS_TABLE_NAME
        environment variable. Do not use legacy resource object syntax such as
        type: "lambda-function" or type: "dynamo-db-table".'
    pageType: concept
