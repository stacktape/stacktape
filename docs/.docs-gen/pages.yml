pages:
  - id: index
    title: Introduction
    route: index
    order: 1
    section: index
    shortDescription: Top-level introduction to Stacktape.
    instructions:
      - Code-first landing page. The CURRENT docs/index.mdx is the hand-edited
        reference — match its structure, length, and tone exactly. Do not
        produce a positioning essay; produce a punchy, example-driven landing
        page.
      - "Structure (in order, no other H2s):"
      - '  1. H1 "Stacktape" + a one-line BOLD tagline that promises speed + AWS
        control. ~25 words.'
      - "  2. A 60-80 word opening paragraph explaining what Stacktape does
        concretely: TypeScript file → one `stacktape deploy` command → 30+ AWS
        resources provisioned with sane defaults + automatic IAM + full override
        access. Name 5-7 specific resource types. State the value vs both
        Terraform and Vercel-style PaaS."
      - "  3. ## A real Stacktape config — a SINGLE <CodeBlock intellisense />
        with a complete 15-22 line stacktape.ts. Required content: defineConfig,
        an HttpApiGateway, a DynamoDbTable with a primaryKey, a LambdaFunction
        with StacktapeLambdaBuildpackPackaging, connectTo wiring the Lambda to
        the table with readWrite access, an HttpApiIntegration event. Use real
        class names from `stacktape` imports. Followed by 1-2 sentences naming
        what gets created on deploy (endpoint, table, IAM auto-injected env var
        `STP_*_NAME`)."
      - '  4. ## What you can build with Stacktape — a <NavBoxGrid columns={2}>
        with 5-6 <NavBox/> entries. Each NavBox has text="...", url="...",
        description="...". Cover concrete use cases: fullstack web apps,
        serverless APIs, long-running services, event-driven pipelines, AI
        agents (agentcore), workflows.'
      - "  5. ## Why Stacktape — 5-6 punchy markdown bullets, each starting with
        a **bold lead phrase**. Concrete advantages: your AWS account / your
        costs (no markup), containers + serverless together, sensible defaults
        with full overrides, no redeploy loop via `stacktape dev`, built-in
        CI/CD + observability, open-source CLI core."
      - "  6. ## Get started — two <NavBoxGrid columns={3}> blocks. First grid:
        configure / dev mode / first deploy. Second grid: resources / console /
        using-with-ai."
      - 'Tone: direct, concrete, no marketing fluff, no emoji, no "🎉" callouts,
        no "PaaS 2.0" or other slogans. The README has marketing copy — copy the
        substance, drop the framing. Reference SST docs style for vibe.'
      - "Length: ~700 words prose total (counting NavBox descriptions). The code
        block is the centerpiece — do not skimp on it."
      - NEVER include a "next →" trailing link. The Get started NavBoxGrid IS
        the navigation.
    pageType: introduction
  - id: getting-started__configure-your-stack
    title: Configure Your Stack
    route: getting-started/configure-your-stack
    order: 2
    section: getting-started
    shortDescription: Write your stacktape.ts. Pick a starter, generate config from
      a repo, or use the visual editor.
    instructions:
      - "Step 1 of Getting Started. Hands-on. Show three paths: (a) `stacktape
        init` to bootstrap from a starter, (b) the Console's AI config
        generation from a Git repo, (c) the visual config editor with
        IntelliSense and live price estimation."
      - Lead with TypeScript class-based config (defineConfig + class
        resources). Show a concrete ~20-line example.
      - Briefly mention the visual editor + AI config generation as alternatives
        — link to the Console pages, do not deep-dive here.
      - End with "next → Use the dev mode".
    pageType: getting-started
  - id: getting-started__use-the-dev-mode
    title: Use the Dev Mode
    route: getting-started/use-the-dev-mode
    order: 3
    section: getting-started
    shortDescription: Run `stacktape dev` once, then iterate locally without
      redeploys. The wow moment.
    instructions:
      - Step 2 of Getting Started. The wow moment. Show how `stacktape dev` runs
        Lambda + container code locally with live AWS resources, no redeploy
        needed.
      - "Concretely: code change → save → see the result. Mention which
        resources can run locally and which proxy to AWS."
      - Touch on debugging (debug-logs, debug-metrics) only briefly — link to
        /local-development for depth.
      - End with "next → Deploy your first stage".
    pageType: getting-started
  - id: getting-started__deploy-your-first-stage
    title: Deploy Your First Stage
    route: getting-started/deploy-your-first-stage
    order: 4
    section: getting-started
    shortDescription: Login, connect AWS, run `stacktape deploy`. Watch a real stack
      come up in your AWS account.
    instructions:
      - Step 3 of Getting Started. Hands-on. Show CLI login, AWS account
        connection, `stacktape deploy --stage <name> --region <region>`.
      - Document what gets created on AWS at deploy time (CloudFormation stack,
        resources, deployment artifacts).
      - Show both CLI and Console deploy paths — link to
        /stacktape-console/connecting-your-aws-account for the Console-side AWS
        setup.
      - End with "next → Manage your app in the Console".
    pageType: getting-started
  - id: getting-started__using-console-ui
    title: Using Console UI
    route: getting-started/using-console-ui
    order: 5
    section: getting-started
    shortDescription: After deploying, the Console gives you logs, metrics, alarms,
      issues, secrets, and cost — for free.
    instructions:
      - Step 4 of Getting Started. Walk the reader through the Console after
        deploying. Sell the "you got all of this for free" angle.
      - "Cover: project/stage overview, logs (live tail), metrics, alarms,
        issues (auto error tracking), cost dashboards, secrets management."
      - Each subsection should be 2-3 sentences and link to /operations/<page>
        for the deep dive.
      - End with "next → CI/CD".
    pageType: getting-started
  - id: getting-started__ci-cd
    title: CI/CD
    route: getting-started/ci-cd
    order: 6
    section: getting-started
    shortDescription: Wire up auto-deploy on push and PR previews via GitOps. Or
      integrate with your own CI.
    instructions:
      - Step 5 of Getting Started. Set up automated deploys.
      - "Show two paths: (a) GitOps via Console (push-to-deploy, PR preview
        environments) — the recommended path; (b) custom CI integration (GitHub
        Actions, CircleCI, etc.) using the CLI."
      - Brief — link to /ci-cd-and-gitops/* for depth.
      - End with "next → Going to production".
    pageType: getting-started
  - id: getting-started__going-to-production
    title: Going to Production
    route: getting-started/going-to-production
    order: 7
    section: getting-started
    shortDescription: "Production-readiness checklist: alarms, budgets, custom
      domains, multi-region, gradual deployments, guardrails."
    instructions:
      - Step 6 of Getting Started (final). The production checklist.
      - "Cover: alarms, budgets, custom domains, multi-region, gradual
        deployments (canary/linear), guardrails. Brief — each item gets 2-4
        sentences and a link to its full page."
      - 'End with branching cards: "Build with Recipes", "Customize Resources",
        "Operations deep-dive".'
    pageType: getting-started
