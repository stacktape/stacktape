# Human-editable guidance consumed by docs/scripts/generate-docs/context.ts.
# Add instructions under the first URL segment of the docs route:
# - /resources/compute/lambda-function -> resources
# - /reference/cli/deploy            -> reference
# - /tour/install-and-deploy         -> tour
# - /stacktape-console/...           -> stacktape-console
# For the docs index route, use index.

sections:
  index:
    - The Introduction page is a framing page that sets up Getting Started. Lead with the problem Stacktape solves and its position vs raw AWS / IaC / PaaS.
    - Do NOT use it as a setup tutorial — Getting Started handles that.
    - Keep the page short — under ~400 words. End with "next →" to /getting-started/configure-your-stack.

  getting-started:
    # The 6-step Getting Started flow. Linear, hands-on. Every page ends with a "next →" link.
    - Each Getting Started page is hands-on — target 400–800 words plus code blocks and screenshots.
    - End every page with a "next →" link to the following step.
    - Include a small "skip ahead" link at the top of each page so returning users aren't trapped in the linear flow.
    - The flow is the only onboarding path — there is no separate tour or quickstart.
    - "Linear order MUST be preserved — each step builds on the previous: step 1 (configure) writes the config that step 3 deploys; step 2 (dev mode) iterates locally before step 3 (first deploy); step 4 (Console) introduces what's around the deployed stack; step 5 (CI/CD) automates redeploys; step 6 (production) hardens the stack."
    - 'Each page showcases a relevant best part of Stacktape contextually — visual editor + AI config gen in step 1, dev mode wow in step 2, deploy + AWS account UX in step 3, dashboards/alarms/issues/cost in step 4, GitOps in step 5, alarms/budgets/guardrails in step 6.'
    - Prefer TypeScript class-based stacktape.ts examples; never YAML.
    - Be opinionated about the recommended path. Mention alternatives (CLI vs Console, GitOps vs custom CI) but pick one as the default for the prose.

  configuration:
    - These pages are conceptual, not reference. Ground claims in source, but do not exhaustively enumerate options.
    - Every page should answer "why does this exist?" and "when do I touch this?" before "how does it work?".
    - Use a single short example per concept, not multiple variants.

    # Triggers sub-section (configuration/triggers/*) — was previously its own top-level "Events & Triggers" section
    - Trigger pages (configuration/triggers/*) — every event source page should include the canonical TypeScript event-binding example with the trigger property focused.
    - Document the event payload shape only when it is non-obvious or differs from the AWS default.
    - Always note throughput / batching / retry behavior when present in source.

    # Secrets page (configuration/secrets) — single page covering the $Secret() directive + Console workflow
    - The secrets page should show: how to create a secret in the Console, how to reference it via $Secret(name) in stacktape.ts, and how it gets injected into Lambda/container env vars at runtime.

  resources:
    - Include a "When should I use this?" section or equivalent early in resource pages.
    - Include a "When NOT to use this" subsection — be explicit about alternatives.
    - Include a one-line pricing context near the top when pricing data is in the provided source files.
    - Keep section names short. Prefer compact H2 labels such as "Scaling", "Health checks", "Networking", "Packaging",
      "Basic example", and "When to use it"; avoid full-sentence headings unless the question is very short.
    - Prefer TypeScript class-based stacktape.ts examples that define resource variables and return them from defineConfig.
    - Use <CodeBlock intellisense tabs={[...]} /> only for Stacktape config examples.
    - Keep non-config code examples as ordinary fenced code blocks without Stacktape intellisense.
    - The API reference component carries exhaustive option coverage; prose should NOT enumerate every property.

    # Section structure — agent picks, not a fixed template
    - Do NOT use a generic "Key Configuration Areas" section. Pick H2 sections that match this resource's actual
      configuration shape and the user's mental model — e.g. "Networking", "Scaling", "Packaging", "Triggers",
      "Connecting to other resources". Use the property tree from the source as your guide, not a rigid backbone.
    - For each H2 you create, anchor it to a real concern users have when configuring this resource. Skip a section
      that has nothing source-grounded to say.
    - Cross-cutting concerns that already have their own dedicated docs section (packaging, triggers, alarms,
      log forwarding, connecting resources) should be linked to, not re-explained from scratch on every resource page.
    - Resource pages must include exactly one <ApiReference definitionName="..." /> component. Its position on the page is the writer's choice — top, middle, or bottom — based on whichever fits the page's narrative. The component is compact, so placing it near the top is a valid option when the reader's primary goal is looking up properties.
      Nested composite types (packaging, scaling, triggers, etc.) are reachable through the component's built-in
      drill-down — do NOT add additional <ApiReference> blocks for sub-types, and do NOT use <PropertiesTable> (it
      has been removed from the writer surface). Do NOT manually enumerate properties in prose just to document them.

  packaging:
    # Section covers Lambda + container packaging modes, split into two sub-sections:
    # packaging/function/* and packaging/containers/*.
    - The hub page (packaging/overview) is a router — explain the function-vs-containers split and when each path applies. Do NOT deep-dive any single packaging mode on the hub page.
    - Distinguish "what gets built" (the artifact — Lambda zip vs container image) from "how it gets built" (the buildpack / Dockerfile / etc).
    - Always show the smallest valid example for that packaging mode at the top of its page.
    - When two packaging modes overlap (e.g. stacktape buildpack vs custom Dockerfile), include a one-line "use X if ..., use Y if ...".
    - Function packaging pages (packaging/function/*) apply only to LambdaFunction resources. Make this explicit in the opening paragraph.
    - Container packaging pages (packaging/containers/*) apply to web-service, private-service, worker-service, multi-container-workload, batch-job. Make this explicit.

  deployment-and-lifecycle:
    - Distinguish CLI behavior (src/commands) from Console behavior (console-app) — never blur the two.
    - Where deploy-time state matters (in-progress deployments, rollbacks, cancelled stacks), describe the relevant CloudFormation stack states inline.

  observability:
    # Split out of the old Operations section. Focused on logs, metrics, alarms, issues, alert channels, notifications, log forwarding.
    - Distinguish CLI debug commands (src/commands/debug-*) from Console views (console-app/src/pages). Never blur the two.
    - When discussing alarms, reference both the config-time definition (types/stacktape-config/alarms.d.ts) and the runtime view (Console alarm pages).
    - For each observability surface (logs, metrics, alarms, issues), make it clear what the user can do from the CLI vs the Console.
    - Cost is a separate section — do not include cost content here. Link to /managing-costs/* if cost context is needed.

  managing-costs:
    # Split out of the old Operations section. Focused on cost dashboards, budgets, attribution, and optimization.
    - Whenever the source has concrete pricing, surface it as a number, not a vague claim.
    - Be explicit that costs are billed by AWS to the user's AWS account, and that Stacktape's subscription fee is separate.
    - Distinguish "viewing cost" (Console dashboards) from "controlling cost" (budgets, alerts) from "reducing cost" (optimization recommendations).

  guardrails:
    # Promoted to top-level out of the old Operations section. Focused on organization-wide policy controls.
    - Ground every guardrail claim in types/stacktape-config/guardrails.d.ts.
    - Distinguish guardrails (preventive policy) from alarms (reactive monitoring) — they live in different sections for a reason; do not conflate.
    - Document the failure mode explicitly: what happens when a deploy violates a guardrail (validation error, blocked deploy, etc.).

  ci-cd-and-gitops:
    - Distinguish CodeBuild-based runners from EC2 runners explicitly.
    - When discussing GitHub or GitLab integrations, ground the mechanics in console-app/server/lambdas/github-app source where available.
    - Per-PR / per-branch stage patterns belong here, not under deployment-and-lifecycle.

  local-development:
    - Separate dev mode behavior from deployed-stack behavior.
    - Be explicit when a feature is dev-mode only or deployed-stack only. Do not imply parity that does not exist.

  using-with-ai:
    - Be concrete about which AI tools are integrated (MCP, Claude Code, Cursor, etc.) and how.
    - Do not overclaim AI capabilities — match what src/commands/mcp and console-app MCP server actually do.
    - The MCP server is currently in active development. Pages about it MUST start with a "Preview — in active development" callout and avoid promising functionality that does not yet ship.

  stacktape-console:
    - Ground UI behavior in console-app source files (src/pages/**, src/Explanations.tsx, src/components/Navigation/**).
    - Do not invent screenshots or UI flows not present in source.
    - Prefer phrasing like "in the Stacktape Console, navigate to ..." with the literal route from console-app routing.
    - When the Console wraps a CLI capability, link to the CLI reference page rather than re-documenting flags.

  recipes:
    - Each recipe must end with a working stacktape.ts and the application code needed to run.
    - Be opinionated about defaults — pick one stack, do not present 3 alternatives in the same recipe.
    - Keep prose between code blocks short and decision-oriented.

  cli:
    # CLI command reference, one page per command at /cli/<command-name>.
    - CLI pages are generated from src/config/cli/commands.ts through src/config/cli/utils.ts. If a CLI page is wrong, update commandDefinitions or the source command implementation first; do not hand-patch the generated MDX as the durable fix.
    - Each page documents exactly one command. No multi-command overview pages here.
    - Include realistic command invocations with all required flags shown.
    - Use the auto-generated <CliCommandsApiReference command="X" sortedArgs={...} /> component for the flags table — never hand-author it.
    - Lead with one short paragraph stating what the command does and when you'd use it. Then a usage example. Then the auto-generated reference. Then "Examples" if there are non-obvious patterns. Then "Related commands" linking to the 1-3 closest siblings.
    - Errors mentioned in the prose should reference src/config/error-messages.ts where applicable.
    - For database row/query inspection, steer users to `stacktape debug:sql` before bastion tunnel workflows. Bastion tunnels are for persistent local database-client access, not the first answer to "query/check a row from the command line".
