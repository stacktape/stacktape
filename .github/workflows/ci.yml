name: Public CI

on:
  pull_request:
  push:
    branches:
      - main
      - v4/integration

permissions:
  contents: read

jobs:
  public:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false
      - uses: pnpm/action-setup@v4
        with:
          version: 11.17.0
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check:public
