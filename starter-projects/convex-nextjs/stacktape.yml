# For the first deploy we keep the post-deploy `convex codegen` hook off — it
# depends on the admin key, which is generated inside the backend container by
# `./generate_key` and surfaced via a follow-up plumbing step. Workflow today:
#
#   1. `stacktape deploy` — provisions backend, DB, buckets, ALB, dashboard.
#   2. SSH-equivalent into the container (`stacktape container:session`) and run
#      `./generate_key <instance_name> $INSTANCE_SECRET` to mint an admin key.
#   3. Run `npx convex codegen` and `npx convex deploy` locally with
#      `CONVEX_SELF_HOSTED_URL=<deployed url>` and `CONVEX_SELF_HOSTED_ADMIN_KEY=<key>`
#      to push your function code.
#
# TODO(convex): wire admin-key generation as a CF custom resource so this becomes
# automatic. The Lambda handler skeleton is already in place at
# `helper-lambdas/stacktapeServiceLambda/custom-resources/resolvers/convex-admin-key.ts`.

resources:
  convex:
    type: convex
    properties:
      appDirectory: ./convex
      backend:
        resources:
          cpu: 0.5
          memory: 1024
      dashboard:
        enabled: true
        resources:
          cpu: 0.25
          memory: 512

# NOTE: in a real production setup you'd also declare a `nextjs-web` resource pointing
# at this Convex instance:
#
#   web:
#     type: nextjs-web
#     properties:
#       appDirectory: ./
#       environment:
#         - name: NEXT_PUBLIC_CONVEX_URL
#           value: $ResourceParam('convex', 'url')
#
# It's commented out in this initial scaffolding because the OpenNext build of the
# Next.js 15.4.6 starter has an unrelated `--webpack` flag incompatibility on this
# host. The Next.js code in `app/` is still wired up for when the resolver lands and
# the build issue is resolved.
